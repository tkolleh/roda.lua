---
name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} - Lua 5.4
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lux
        uses: lumen-oss/gh-actions-lux@v1
        with:
          version: 0.18.8

      - name: Run tests
        run: |
          lx --lua-version 5.4 test

  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lux
        uses: lumen-oss/gh-actions-lux@v1
        with:
          version: 0.18.8

      - name: Check formatting
        run: |
          lx fmt
          git diff --exit-code || (echo "::error::Code is not formatted. Run 'lx fmt' locally and commit the changes." && exit 1)

      - name: Run linter
        run: lx --lua-version 5.4 lint

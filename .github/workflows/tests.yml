---
name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} - Lua ${{ matrix.lua_version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
        lua_version:
          - "5.1"
          - "5.2"
          - "5.3"
          - "5.4"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lux
        uses: lumen-oss/gh-actions-lux@v1
        with:
          version: 0.18.8

      - name: Run tests
        run: |
          lx --lua-version ${{ matrix.lua_version }} test

  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lux
        uses: lumen-oss/gh-actions-lux@v1
        with:
          version: 0.18.8

      - name: Check formatting
        run: lx fmt --check

      - name: Run linter
        run: lx lint
